<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Scorebug preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#1a1a1a; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px; font-family: ui-sans-serif, system-ui; padding:40px; }
  .label { color:#888; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:8px; }
  .stage { background:url('https://images.unsplash.com/photo-1543326727-cf6c39e8f84c?w=800') center/cover; width:480px; height:270px; border-radius:12px; position:relative; overflow:hidden; }
  .bug-bg { background: linear-gradient(135deg, rgba(15,15,18,0.92) 0%, rgba(28,28,32,0.88) 100%); }
</style>
</head>
<body>

<div>
  <div class="label">1st half · home jersey BLACK</div>
  <div class="stage">
    <div class="absolute z-10 pointer-events-none flex flex-col items-center top-2 left-2">
      <!-- Row 1: score (rounded all corners) -->
      <div class="bug-bg rounded-xl shadow-2xl border border-white/15 overflow-hidden backdrop-blur-md">
        <div class="flex items-stretch text-[11px]">
          <div class="flex items-center pl-1.5 pr-2.5 py-1.5">
            <div class="w-[6px] h-5 rounded-sm mr-2" style="background:#000; border:1px solid rgba(255,255,255,0.9); box-shadow:0 0 6px #00000080"></div>
            <span class="font-bold tracking-wider truncate max-w-[5rem] text-white" style="text-shadow:0 1px 2px rgba(0,0,0,0.6)">STM</span>
          </div>
          <div class="px-2.5 py-1.5 flex items-center gap-1.5 bg-black/30">
            <span class="tabular-nums text-white text-base leading-none" style="text-shadow:0 1px 3px rgba(0,0,0,0.7)">2</span>
            <span class="text-white/30 text-xs">–</span>
            <span class="tabular-nums text-white text-base leading-none" style="text-shadow:0 1px 3px rgba(0,0,0,0.7)">1</span>
          </div>
          <div class="flex items-center pl-2.5 pr-1.5 py-1.5">
            <span class="font-bold tracking-wider truncate max-w-[5rem] text-white" style="text-shadow:0 1px 2px rgba(0,0,0,0.6)">OPP</span>
            <div class="w-[6px] h-5 rounded-sm ml-2" style="background:#dc2626; border:1px solid rgba(255,255,255,0.9); box-shadow:0 0 6px #dc262680"></div>
          </div>
        </div>
      </div>
      <!-- Row 2: narrower status pill, rounded bottom -->
      <div class="-mt-px px-4 py-1 rounded-b-lg border border-t-0 border-white/15 shadow-lg backdrop-blur-md flex items-center gap-1.5 bg-stone-800/90 text-white">
        <span class="tabular-nums text-[13px] font-extrabold tracking-[0.15em] leading-none">1ST · 27'</span>
      </div>
    </div>
  </div>
</div>

<div>
  <div class="label">LIVE</div>
  <div class="stage">
    <div class="absolute z-10 pointer-events-none flex flex-col items-center top-2 left-2">
      <div class="bug-bg rounded-xl shadow-2xl border border-white/15 overflow-hidden backdrop-blur-md">
        <div class="flex items-stretch text-[11px]">
          <div class="flex items-center pl-1.5 pr-2.5 py-1.5">
            <div class="w-[6px] h-5 rounded-sm mr-2" style="background:#84cc16; border:1px solid rgba(255,255,255,0.9); box-shadow:0 0 6px #84cc1680"></div>
            <span class="font-bold tracking-wider truncate max-w-[5rem] text-white" style="text-shadow:0 1px 2px rgba(0,0,0,0.6)">STOMPERS</span>
          </div>
          <div class="px-2.5 py-1.5 flex items-center gap-1.5 bg-black/30">
            <span class="tabular-nums text-white text-base leading-none" style="text-shadow:0 1px 3px rgba(0,0,0,0.7)">3</span>
            <span class="text-white/30 text-xs">–</span>
            <span class="tabular-nums text-white text-base leading-none" style="text-shadow:0 1px 3px rgba(0,0,0,0.7)">2</span>
          </div>
          <div class="flex items-center pl-2.5 pr-1.5 py-1.5">
            <span class="font-bold tracking-wider truncate max-w-[5rem] text-white" style="text-shadow:0 1px 2px rgba(0,0,0,0.6)">EAGLES</span>
            <div class="w-[6px] h-5 rounded-sm ml-2" style="background:#dc2626; border:1px solid rgba(255,255,255,0.9); box-shadow:0 0 6px #dc262680"></div>
          </div>
        </div>
      </div>
      <div class="-mt-px px-4 py-1 rounded-b-lg border border-t-0 border-white/15 shadow-lg backdrop-blur-md flex items-center gap-1.5 bg-red-600/95 text-white">
        <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
        <span class="tabular-nums text-[13px] font-extrabold tracking-[0.15em] leading-none">LIVE · 63'</span>
      </div>
    </div>
  </div>
</div>

<div>
  <div class="label">Full time</div>
  <div class="stage">
    <div class="absolute z-10 pointer-events-none flex flex-col items-center top-2 left-2">
      <div class="bug-bg rounded-xl shadow-2xl border border-white/15 overflow-hidden backdrop-blur-md">
        <div class="flex items-stretch text-[11px]">
          <div class="flex items-center pl-1.5 pr-2.5 py-1.5">
            <div class="w-[6px] h-5 rounded-sm mr-2" style="background:#1e40af; border:1px solid rgba(255,255,255,0.9); box-shadow:0 0 6px #1e40af80"></div>
            <span class="font-bold tracking-wider truncate max-w-[5rem] text-white" style="text-shadow:0 1px 2px rgba(0,0,0,0.6)">STM</span>
          </div>
          <div class="px-2.5 py-1.5 flex items-center gap-1.5 bg-black/30">
            <span class="tabular-nums text-white text-base leading-none" style="text-shadow:0 1px 3px rgba(0,0,0,0.7)">4</span>
            <span class="text-white/30 text-xs">–</span>
            <span class="tabular-nums text-white text-base leading-none" style="text-shadow:0 1px 3px rgba(0,0,0,0.7)">2</span>
          </div>
          <div class="flex items-center pl-2.5 pr-1.5 py-1.5">
            <span class="font-bold tracking-wider truncate max-w-[5rem] text-white" style="text-shadow:0 1px 2px rgba(0,0,0,0.6)">FCB</span>
            <div class="w-[6px] h-5 rounded-sm ml-2" style="background:#fbbf24; border:1px solid rgba(255,255,255,0.9); box-shadow:0 0 6px #fbbf2480"></div>
          </div>
        </div>
      </div>
      <div class="-mt-px px-4 py-1 rounded-b-lg border border-t-0 border-white/15 shadow-lg backdrop-blur-md flex items-center gap-1.5 bg-stone-700/90 text-stone-100">
        <span class="tabular-nums text-[13px] font-extrabold tracking-[0.15em] leading-none">FT</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>

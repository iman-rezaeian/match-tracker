<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>360° Player — Phase 1 Scratch</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      background: #000; color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      overscroll-behavior: none; -webkit-user-select: none; user-select: none;
    }
    #stage { position: fixed; inset: 0; touch-action: none; }
    canvas { display: block; width: 100%; height: 100%; }

    /* ---------- top bar ---------- */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 12px 14px;
      display: flex; gap: 8px; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0));
      pointer-events: none; z-index: 10;
    }
    .topbar > * { pointer-events: auto; }
    .pill {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      color: #eee;
      font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 6px 10px; border-radius: 999px;
    }
    .src-select {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      color: #eee; font-size: 12px; font-weight: 600;
      padding: 6px 10px; border-radius: 8px;
      max-width: 60vw;
    }

    /* ---------- bottom controls ---------- */
    .controls {
      position: fixed; left: 0; right: 0; bottom: 0;
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom)) 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0));
      display: flex; flex-direction: column; gap: 10px;
      z-index: 10;
    }
    .row { display: flex; align-items: center; gap: 10px; }
    button.icon {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 44px; height: 44px; border-radius: 999px;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    button.icon:active { transform: scale(0.95); }
    button.txt {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
    }
    .time { font-variant-numeric: tabular-nums; font-size: 12px; color: #ccc; min-width: 92px; text-align: center; }
    .scrub { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
    .scrub::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #84cc16; cursor: pointer; }
    .scrub::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #84cc16; border: none; cursor: pointer; }

    /* ---------- overlay ---------- */
    .overlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55); z-index: 20; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .overlay.hidden { opacity: 0; }
    .overlay button {
      pointer-events: auto;
      background: rgba(132, 204, 22, 0.95);
      color: #000; border: none;
      font-size: 18px; font-weight: 800; letter-spacing: 0.05em;
      padding: 18px 28px; border-radius: 999px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .hint {
      position: fixed; top: 60px; left: 14px; right: 14px;
      font-size: 11px; color: rgba(255,255,255,0.55);
      pointer-events: none; z-index: 5;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <div class="topbar">
    <span class="pill">360° · phase 1</span>
    <select id="srcSelect" class="src-select">
      <option value="sample-tahiti">Sample · Three.js 360° demo</option>
      <option value="r2-latest">R2 · stompers-videos/latest.mp4</option>
      <option value="custom">Custom URL…</option>
    </select>
    <span class="pill" id="fovPill">FOV 75°</span>
  </div>

  <div class="hint">drag to look around · pinch / scroll to zoom</div>

  <div class="controls">
    <div class="row">
      <input id="scrub" class="scrub" type="range" min="0" max="1000" value="0" />
      <span class="time" id="time">0:00 / 0:00</span>
    </div>
    <div class="row">
      <button id="play" class="icon" aria-label="Play">▶</button>
      <button id="back" class="icon" aria-label="Back 10s">⏪</button>
      <button id="fwd" class="icon" aria-label="Forward 10s">⏩</button>
      <button id="recenter" class="txt">RECENTER</button>
      <button id="mute" class="txt">MUTE</button>
      <button id="fs" class="txt" style="margin-left:auto">FULLSCREEN</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <button id="bigPlay">TAP TO START</button>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ---------- sample sources (free, public, CORS-friendly equirectangular MP4s) ----------
    // NOTE: These are picked because they stream from CDNs that send the Access-Control-Allow-Origin header.
    // If any one of them stops working, just paste a different URL via the "Custom URL…" option.
    const R2_PUBLIC = 'https://pub-27636b574e544724ab8c5d7c7e755a99.r2.dev';
    const SAMPLES = {
      'sample-tahiti': {
        // Three.js's official equirectangular sample — small interior, but proves the renderer works
        url: 'https://threejs.org/examples/textures/MaryOculus.mp4',
        label: 'Three.js 360° demo',
        isHls: false,
      },
      'r2-latest': {
        url: `${R2_PUBLIC}/latest.mp4`,
        label: 'Latest X5 upload — drag a file named latest.mp4 into the R2 bucket to test',
        isHls: false,
      },
    };

    // ---------- DOM ----------
    const stage = document.getElementById('stage');
    const playBtn = document.getElementById('play');
    const bigPlay = document.getElementById('bigPlay');
    const overlay = document.getElementById('overlay');
    const scrub = document.getElementById('scrub');
    const timeLbl = document.getElementById('time');
    const fovPill = document.getElementById('fovPill');
    const muteBtn = document.getElementById('mute');
    const fsBtn = document.getElementById('fs');
    const recenterBtn = document.getElementById('recenter');
    const backBtn = document.getElementById('back');
    const fwdBtn = document.getElementById('fwd');
    const srcSelect = document.getElementById('srcSelect');

    // ---------- video element ----------
    const video = document.createElement('video');
    video.crossOrigin = 'anonymous';
    video.playsInline = true;
    video.loop = true;
    video.muted = true;          // start muted so autoplay can succeed on iOS
    video.preload = 'auto';

    // ---------- three.js setup ----------
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    stage.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1100);
    camera.position.set(0, 0, 0.01);

    // Inverted sphere so we view from inside
    const geometry = new THREE.SphereGeometry(500, 64, 40);
    geometry.scale(-1, 1, 1);

    const videoTexture = new THREE.VideoTexture(video);
    videoTexture.colorSpace = THREE.SRGBColorSpace;
    videoTexture.minFilter = THREE.LinearFilter;
    videoTexture.magFilter = THREE.LinearFilter;

    const material = new THREE.MeshBasicMaterial({ map: videoTexture });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // ---------- look / zoom state ----------
    let lon = 0, lat = 0;        // degrees
    let targetLon = 0, targetLat = 0;
    let fov = 75;                // degrees
    let targetFov = 75;
    const MIN_FOV = 25, MAX_FOV = 110;

    // ---------- pointer handling (drag-to-pan + pinch-zoom) ----------
    const pointers = new Map(); // id → {x, y}
    let dragLast = null;
    let pinchStartDist = 0;
    let pinchStartFov = fov;

    function pointerDist() {
      const pts = [...pointers.values()];
      if (pts.length < 2) return 0;
      const dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
      return Math.hypot(dx, dy);
    }

    stage.addEventListener('pointerdown', (e) => {
      stage.setPointerCapture(e.pointerId);
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 1) {
        dragLast = { x: e.clientX, y: e.clientY };
      } else if (pointers.size === 2) {
        dragLast = null;
        pinchStartDist = pointerDist();
        pinchStartFov = fov;
      }
    });

    stage.addEventListener('pointermove', (e) => {
      if (!pointers.has(e.pointerId)) return;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (pointers.size === 1 && dragLast) {
        const dx = e.clientX - dragLast.x;
        const dy = e.clientY - dragLast.y;
        // Sensitivity scales with FOV so zoomed-in is more precise
        const sensitivity = 0.1 * (fov / 75);
        targetLon -= dx * sensitivity;
        targetLat += dy * sensitivity;
        targetLat = Math.max(-85, Math.min(85, targetLat));
        dragLast = { x: e.clientX, y: e.clientY };
      } else if (pointers.size === 2) {
        const d = pointerDist();
        if (pinchStartDist > 0) {
          const ratio = pinchStartDist / d;
          targetFov = Math.max(MIN_FOV, Math.min(MAX_FOV, pinchStartFov * ratio));
        }
      }
    });

    function endPointer(e) {
      pointers.delete(e.pointerId);
      if (pointers.size < 2) pinchStartDist = 0;
      if (pointers.size === 0) dragLast = null;
      if (pointers.size === 1) {
        const only = [...pointers.values()][0];
        dragLast = { x: only.x, y: only.y };
      }
    }
    stage.addEventListener('pointerup', endPointer);
    stage.addEventListener('pointercancel', endPointer);
    stage.addEventListener('pointerleave', endPointer);

    // Wheel zoom on desktop
    stage.addEventListener('wheel', (e) => {
      e.preventDefault();
      targetFov = Math.max(MIN_FOV, Math.min(MAX_FOV, targetFov + e.deltaY * 0.05));
    }, { passive: false });

    // ---------- resize ----------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------- render loop ----------
    function animate() {
      requestAnimationFrame(animate);

      // Smooth (damped) approach to target
      lon += (targetLon - lon) * 0.18;
      lat += (targetLat - lat) * 0.18;
      fov += (targetFov - fov) * 0.18;

      camera.fov = fov;
      camera.updateProjectionMatrix();
      fovPill.textContent = `FOV ${Math.round(fov)}°`;

      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon);
      const target = new THREE.Vector3(
        Math.sin(phi) * Math.cos(theta),
        Math.cos(phi),
        Math.sin(phi) * Math.sin(theta),
      );
      camera.lookAt(target);
      renderer.render(scene, camera);
    }
    animate();

    // ---------- video controls wiring ----------
    function fmt(t) {
      if (!isFinite(t)) return '0:00';
      const m = Math.floor(t / 60), s = Math.floor(t % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }
    video.addEventListener('timeupdate', () => {
      if (!scrubDragging) {
        const pct = (video.currentTime / (video.duration || 1)) * 1000;
        scrub.value = String(pct);
      }
      timeLbl.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
    });
    video.addEventListener('play', () => { playBtn.textContent = '⏸'; });
    video.addEventListener('pause', () => { playBtn.textContent = '▶'; });
    video.addEventListener('loadedmetadata', () => {
      timeLbl.textContent = `0:00 / ${fmt(video.duration)}`;
    });
    video.addEventListener('error', () => {
      console.error('Video error', video.error);
      bigPlay.textContent = 'LOAD FAILED — TRY ANOTHER SOURCE';
      overlay.classList.remove('hidden');
    });

    playBtn.addEventListener('click', () => {
      if (video.paused) video.play(); else video.pause();
    });
    bigPlay.addEventListener('click', async () => {
      try { await video.play(); overlay.classList.add('hidden'); }
      catch (err) { console.error(err); }
    });

    let scrubDragging = false;
    scrub.addEventListener('input', () => { scrubDragging = true; });
    scrub.addEventListener('change', () => {
      const pct = parseFloat(scrub.value) / 1000;
      if (isFinite(video.duration)) video.currentTime = pct * video.duration;
      scrubDragging = false;
    });

    backBtn.addEventListener('click', () => { video.currentTime = Math.max(0, video.currentTime - 10); });
    fwdBtn.addEventListener('click', () => { video.currentTime = Math.min(video.duration || 0, video.currentTime + 10); });
    recenterBtn.addEventListener('click', () => { targetLon = 0; targetLat = 0; targetFov = 75; });
    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      muteBtn.textContent = video.muted ? 'MUTE' : 'UNMUTE';
    });
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    });

    // ---------- source switching ----------
    let hlsScriptPromise = null;
    function loadHlsScript() {
      if (hlsScriptPromise) return hlsScriptPromise;
      hlsScriptPromise = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
      return hlsScriptPromise;
    }

    let currentHls = null;
    async function loadSource(key) {
      if (currentHls) { currentHls.destroy(); currentHls = null; }

      let url, isHls = false;
      if (key === 'custom') {
        const entered = prompt('Paste a video URL (MP4 or HLS .m3u8):', '');
        if (!entered) { srcSelect.value = 'sample-bigshark'; return loadSource('sample-bigshark'); }
        url = entered.trim();
        isHls = /\.m3u8(\?|$)/i.test(url);
      } else {
        const cfg = SAMPLES[key];
        url = cfg.url; isHls = cfg.isHls;
      }

      if (isHls) {
        // Safari can play HLS natively
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
        } else {
          await loadHlsScript();
          // eslint-disable-next-line no-undef
          if (window.Hls && Hls.isSupported()) {
            currentHls = new Hls();
            currentHls.loadSource(url);
            currentHls.attachMedia(video);
          } else {
            alert('HLS not supported in this browser.');
            return;
          }
        }
      } else {
        video.src = url;
      }
      video.load();
      overlay.classList.remove('hidden');
      bigPlay.textContent = 'TAP TO START';
    }

    srcSelect.addEventListener('change', (e) => loadSource(e.target.value));

    // Start
    loadSource('sample-tahiti');
  </script>
</body>
</html>
